spring:
  application:
    name: tower-dungeon
  output:
    ansi:
      enabled: always

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: '*'

server:
  compression:
    enabled: true
  http2:
    enabled: true
  port: 8080

game:
  start:
    credit: 10.0
  loop:
    lifecycle-ms: 1000
    invasion-tick-ms: 10
    supply-drain-per-unit: 1.5
    starvation-damage: 5.0
  reward:
    credit-per-floor: 2.0
    materials-per-floor: 5.0
    supplies-per-floor: 3.0
    relic-depth-threshold: 10
    boss-reward-multiplier: 3.0
    materials-sell-price: 2.0
    relics-sell-price: 25.0
  tower:
    max-floor: 100
  boss:
    interval: 10
    health-base-multiplier: 3.0
    health-multiplier-per-floor: 0.05
    damage-multiplier: 1.25
  enemies:
    base-budget: 3.0
    budget-per-floor: 0.8
    quadratic-per-floor: 0.04
    variance: 0.25
    surge-interval: 5
    surge-multiplier: 1.5
    ease-budget-per-boss: 0.15
    ease-difficulty-per-boss: 1
    min-budget: 1.0
  supply:
    base-max: 100.0
  magic:
    max-mana: 5.0
    cost-per-cast: 1.0
    recharge-per-tick: 0.25
    tower-recharge-per-tick: 0.05
  reinforcements:
    climb-floors-per-tick: 1.0
  healing:
    cost-per-hp: 1.0
    hp-per-tick: 5.0
  village:
    starting-food: 100.0
    starting-villagers: 20
    villager-food-production: 0.5
    unit-food-consumption: 1.0
