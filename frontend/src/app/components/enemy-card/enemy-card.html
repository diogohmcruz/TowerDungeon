<div class="enemy">
  <div class="enemy-head">
    <span class="enemy-type">{{ enemy().stats.type ?? enemy().name }}</span>
    <span class="enemy-hp">
      {{ enemy().currentHealth | number: '1.0-0' }} /
      {{ enemy().stats.health | number: '1.0-0' }}
    </span>
  </div>
  <div class="hp-bar">
    <div class="hp-fill" [style.width.%]="healthPct()"></div>
  </div>
  <div class="enemy-meta">
    <span class="tag">{{ enemy().stats.attackType }}</span>
    <span class="tag">⚔ {{ enemy().stats.damage | number: '1.0-1' }}</span>
  </div>
</div>
