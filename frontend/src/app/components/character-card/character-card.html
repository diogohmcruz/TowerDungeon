<app-card>
  <span card-title class="member-name">{{ member().name }}</span>
  <span card-badge class="member-hp">
    {{ member().currentHealth | number: '1.0-0' }} / {{ maxHealth() | number:
    '1.0-0' }}
  </span>
  <div class="hp-bar">
    <div class="hp-fill" [style.width.%]="healthPct()"></div>
  </div>
  @if (maxMana() > 0) {
    <div class="mana-bar" [title]="'Mana ' + (member().currentMana | number: '1.0-1') + ' / ' + (maxMana() | number: '1.0-1')">
      <div class="mana-fill" [style.width.%]="manaPct()"></div>
    </div>
  }
</app-card>
